<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #1a2744; --accent: #4f8ef7; --accent2: #f7c94f;
            --bg: #f4f6fb; --card-bg: #fff; --text: #1a2744; --muted: #8892aa;
            --border: #e2e7f0; --radius: 16px;
        }
        body { background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--text); min-height: 100vh; }
        .phone-frame { max-width: 390px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding-bottom: 40px; }
        .header { background: var(--navy); padding: 20px; border-radius: 0 0 28px 28px; color: white; }
        .section { padding: 20px 16px 0; }
        .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
        /* 지도 영역 최적화 */
        #map { height: 220px; border-radius: var(--radius); border: 1px solid var(--border); background: #eee; }
        .photo-container { 
            width: 100%; height: 180px; background: #e2e7f0; border-radius: var(--radius);
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px dashed var(--muted);
        }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-box { flex: 1; border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; }
        .save-btn {
            background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
            padding: 16px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 20px;
            transition: transform 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="header">
        <h2 style="font-family:'Space Grotesk'">Park<span>Note</span> Pro</h2>
        <p id="last-saved" style="font-size:12px; opacity:0.8;">위치 탐색 중...</p>
    </div>

    <div class="section">
        <div class="section-label">내 주변 지도</div>
        <div id="map"></div>

        <div class="section-label" style="margin-top:20px;">현장 사진</div>
        <div class="photo-container" onclick="document.getElementById('camera-input').click()">
            <img id="photo-preview" src="">
            <div id="photo-msg" style="text-align:center; color:var(--muted);">
                <p>📷 터치하여 사진 촬영</p>
            </div>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

        <div class="input-row">
            <input class="input-box" id="loc-input" placeholder="구역 (예: B2-14)">
            <input class="input-box" id="memo-input" placeholder="메모">
        </div>

        <button class="save-btn" onclick="saveData()">📍 현재 위치 저장</button>
    </div>
</div>

<div class="toast" id="toast">저장 완료!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";

    window.onload = function() {
        initMap();
        loadSavedData();
    };

    function initMap() {
        // 1. 초기 지도는 마지막 저장 위치 혹은 기본 위치로 즉시 띄움
        map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. 위치 인식 속도 최적화 (빠른 인식 우선)
        if (navigator.geolocation) {
            // 지속적으로 위치 업데이트 (실시간성 강화)
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 17);
                } else {
                    marker.setLatLng([lat, lng]);
                }
                document.getElementById('last-saved').textContent = "위치 인식 완료 (정확도: " + Math.round(pos.coords.accuracy) + "m)";
            }, err => {
                console.log("위치 오류");
            }, {
                enableHighAccuracy: false, // 속도를 위해 처음엔 꺼둠
                maximumAge: 3000,
                timeout: 5000
            });
        }
    }

    // 사진 압축 처리 (저장 속도 및 용량 최적화)
    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.6); // 60% 압축
                    
                    const preview = document.getElementById('photo-preview');
                    preview.src = currentImgBase64;
                    preview.style.display = 'block';
                    document.getElementById('photo-msg').style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function saveData() {
        if (!marker) { alert("위치를 잡는 중입니다. 잠시만 기다려주세요."); return; }
        
        const data = {
            location: document.getElementById('loc-input').value,
            memo: document.getElementById('memo-input').value,
            time: new Date().toLocaleString(),
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng
        };

        try {
            localStorage.setItem('parkNoteData', JSON.stringify(data));
            showToast();
        } catch (e) {
            alert("사진 용량이 너무 큽니다. 다른 사진을 찍어주세요.");
        }
    }

    function loadSavedData() {
        const saved = localStorage.getItem('parkNoteData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('loc-input').value = data.location || "";
            document.getElementById('memo-input').value = data.memo || "";
            if (data.photo) {
                currentImgBase64 = data.photo;
                const preview = document.getElementById('photo-preview');
                preview.src = data.photo;
                preview.style.display = 'block';
                document.getElementById('photo-msg').style.display = 'none';
            }
        }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
