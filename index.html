<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --primary: #4f8ef7; --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; 
            --muted: #64748b; --border: #e2e8f0; --accent: #eef4ff; --danger: #ff4d4d;
        }
        /* [4. UI 고도화] 자동 다크 모드 적용 */
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #2d3a4f; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); transition: 0.3s; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding: 20px 16px 100px; }

        /* [1. 시각적 계층 구조] 헤더 및 히어로 섹션 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-family: 'Space Grotesk'; font-size: 22px; color: var(--primary); }
        .gps-indicator { font-size: 11px; padding: 5px 12px; border-radius: 20px; background: var(--accent); color: var(--muted); display: flex; align-items: center; gap: 5px; }
        .gps-indicator.active { color: #22c55e; background: rgba(34, 197, 94, 0.1); }

        /* 최근 기록 카드 (히어로) */
        .hero-card { background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 24px; border: 1px solid var(--border); }
        .hero-empty { text-align: center; padding: 40px 20px; color: var(--muted); }
        .hero-img { width: 100%; height: 200px; border-radius: 16px; object-fit: cover; margin-bottom: 16px; }
        .hero-info h2 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
        .time-badge { display: inline-block; padding: 4px 10px; border-radius: 8px; background: var(--primary); color: white; font-size: 12px; font-weight: 700; margin-bottom: 10px; }

        /* [2. 입력 마찰 감소] 빠른 입력 버튼 */
        .quick-tags { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 5px; }
        .tag-btn { background: var(--card); border: 1px solid var(--border); padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--muted); white-space: nowrap; cursor: pointer; }
        .tag-btn:active { background: var(--accent); color: var(--primary); }

        .input-group { background: var(--card); border-radius: 20px; padding: 16px; border: 1px solid var(--border); margin-bottom: 16px; }
        .input-field { width: 100%; border: none; background: transparent; padding: 10px 0; font-size: 16px; color: var(--text); outline: none; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
        .input-field::placeholder { color: var(--muted); }

        /* [1. 플로팅 버튼] 디자인 */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 64px; height: 64px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 8px 20px rgba(79, 142, 247, 0.4); border: none; cursor: pointer; z-index: 1000; transition: 0.2s; }
        .fab:active { transform: scale(0.9); background: var(--primary-dark); }

        /* [5. 데이터 보호] 백업 섹션 */
        .backup-row { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .backup-btn { background: none; border: none; font-size: 12px; color: var(--muted); text-decoration: underline; cursor: pointer; }

        /* [4. 스켈레톤 UI 용] */
        #map { height: 180px; border-radius: 16px; margin-bottom: 20px; background: var(--accent); }
        .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; transition: 0.3s; z-index: 9999; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <div class="logo">ParkNote</div>
        <div class="gps-indicator" id="gps-status">● GPS 수신 대기</div>
    </header>

    <div id="hero-area">
        <div class="hero-card hero-empty">저장된 주차 기록이 없습니다.</div>
    </div>

    <div id="map"></div>

    <section class="input-section">
        <div class="quick-tags">
            <button class="tag-btn" onclick="quickFill('지하 1층')">B1</button>
            <button class="tag-btn" onclick="quickFill('지하 2층')">B2</button>
            <button class="tag-btn" onclick="quickFill('지상 1층')">1F</button>
            <button class="tag-btn" onclick="quickFill('기둥 옆')">기둥옆</button>
            <button class="tag-btn" onclick="quickFill('엘리베이터 앞')">엘베앞</button>
        </div>

        <div class="input-group">
            <input class="input-field" id="loc-input" placeholder="주차 위치를 입력하세요">
            <input class="input-field" id="memo-input" placeholder="추가 메모 (선택)">
            <button style="background:var(--accent); color:var(--primary); border:none; padding:10px; border-radius:10px; width:100%; font-weight:700; margin-top:5px;" onclick="document.getElementById('camera-input').click()">📷 사진 촬영</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
    </section>

    <div class="backup-row">
        <button class="backup-btn" onclick="exportData()">데이터 백업</button>
        <button class="backup-btn" onclick="importData()">데이터 불러오기</button>
    </div>
</div>

<button class="fab" onclick="saveData()">📍</button>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    window.onload = function() {
        initMap();
        loadHistory();
        Notification.requestPermission();
        setInterval(render, 60000); // 1분마다 시간 업데이트
    };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.56, 126.97], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                if (!marker) { marker = L.marker([lat, lng]).addTo(map); map.setView([lat, lng], 17); }
                else { marker.setLatLng([lat, lng]); }
                document.getElementById('gps-status').innerHTML = "● GPS 수신 중";
                document.getElementById('gps-status').classList.add('active');
            }, null, { enableHighAccuracy: true });
        }
    }

    // [2. 입력 마찰 감소]
    function quickFill(val) {
        const input = document.getElementById('loc-input');
        input.value = input.value ? input.value + " " + val : val;
        triggerVibration('success');
    }

    document.getElementById('camera-input').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    showToast("사진 촬영 완료!");
                };
            };
            reader.readAsDataURL(file);
        }
    };

    // [3. 상황별 피드백] 저장 로직
    function saveData() {
        if (!marker) return showToast("GPS를 기다리는 중입니다...");
        const record = {
            id: Date.now(), timestamp: Date.now(),
            location: document.getElementById('loc-input').value || "지정되지 않은 위치",
            memo: document.getElementById('memo-input').value || "",
            photo: currentImgBase64, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(record);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkHistory', JSON.stringify(parkingHistory));
        
        render();
        sendNotification(record);
        showToast("📍 주차 위치가 고정되었습니다!");
        triggerVibration('success');
        
        // 입력창 초기화
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        currentImgBase64 = "";
    }

    function render() {
        const hero = document.getElementById('hero-area');
        if (parkingHistory.length === 0) return;

        const latest = parkingHistory[0];
        hero.innerHTML = `
            <div class="hero-card">
                <div class="time-badge">⏱ ${calculateElapsed(latest.timestamp)} 경과</div>
                ${latest.photo ? `<img src="${latest.photo}" class="hero-img">` : ''}
                <div class="hero-info">
                    <h2>${latest.location}</h2>
                    <p style="color:var(--muted); font-size:14px;">${latest.memo}</p>
                </div>
            </div>
        `;
    }

    function calculateElapsed(ts) {
        const mins = Math.floor((Date.now() - ts) / 60000);
        return mins >= 60 ? `${Math.floor(mins/60)}시간 ${mins%60}분` : `${mins}분`;
    }

    // [5. 데이터 보호] 백업 및 복원
    function exportData() {
        const data = localStorage.getItem('parkHistory');
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `parknote_backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                localStorage.setItem('parkHistory', event.target.result);
                location.reload();
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function sendNotification(record) {
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(`🅿️ 주차 확인: ${record.location}`, {
                    body: `방금 주차를 완료했습니다. 알림을 클릭해 위치를 확인하세요.`,
                    image: record.photo,
                    tag: 'parking-info',
                    requireInteraction: true
                });
            });
        }
    }

    function triggerVibration(type) { if (navigator.vibrate) navigator.vibrate(type === 'success' ? 70 : [50, 50]); }
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function loadHistory() { const saved = localStorage.getItem('parkHistory'); if (saved) { parkingHistory = JSON.parse(saved); render(); } }
</script>
</body>
</html>
