<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --navy: #1a2744; --navy-light: #263560; --accent: #4f8ef7; --accent2: #f7c94f;
            --bg: #f4f6fb; --card-bg: #fff; --text: #1a2744; --muted: #8892aa;
            --success: #2dc77a; --danger: #e24b4a; --border: #e2e7f0; --radius: 16px;
            --shadow: 0 2px 16px rgba(26,39,68,0.08);
        }

        body { background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--text); min-height: 100vh; }
        .phone-frame { max-width: 390px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding-bottom: 40px; }

        /* Header */
        .header { background: var(--navy); padding: 20px 20px 28px; border-radius: 0 0 28px 28px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .app-title { color: #fff; font-size: 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
        .app-title span { color: var(--accent2); }

        /* Map Section */
        .section { padding: 20px 16px 0; }
        .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 500; }
        #map { height: 200px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 12px; z-index: 1; }

        /* Photo Section */
        .photo-container {
            width: 100%; height: 180px; background: #e2e7f0; border-radius: var(--radius);
            margin-bottom: 12px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; border: 2px dashed var(--muted);
        }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-placeholder { text-align: center; color: var(--muted); }

        /* Controls */
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .input-box {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px; font-size: 14px; outline: none;
        }
        .save-btn {
            background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
            padding: 16px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 16px rgba(79,142,247,0.3); display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .camera-btn {
            background: var(--navy-light); color: #fff; border: none; border-radius: 12px;
            padding: 10px; font-size: 14px; margin-bottom: 12px; width: 100%; cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 20px;
            transition: transform 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="header">
        <div class="header-top">
            <div class="app-title">Park<span>Note</span> Pro</div>
            <div style="color:white; font-size:12px;" id="last-saved">저장 기록 없음</div>
        </div>
    </div>

    <div class="section">
        <div class="section-label">위치 및 지형</div>
        <div id="map"></div>

        <div class="section-label">현장 사진</div>
        <div class="photo-container" id="photo-area">
            <img id="photo-preview" src="" alt="주차 사진">
            <div class="photo-placeholder" id="photo-msg">
                <p>사진이 없습니다</p>
                <small>카메라 버튼을 눌러 촬영하세요</small>
            </div>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
        <button class="camera-btn" onclick="document.getElementById('camera-input').click()">📷 현장 사진 찍기</button>

        <div class="input-row">
            <input class="input-box" id="loc-input" placeholder="주차 구역 (예: B2-14)">
            <input class="input-box" id="memo-input" placeholder="추가 메모">
        </div>

        <button class="save-btn" onclick="saveData()">
            📍 현재 정보 저장하기
        </button>
    </div>
</div>

<div class="toast" id="toast">정보가 저장되었습니다!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker;
    let currentImgBase64 = "";

    // 1. 초기화 및 지도 설정
    window.onload = function() {
        initMap();
        loadSavedData();
    };

    function initMap() {
        // 기본 위치 (서울)
        map = L.map('map').setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 현재 위치 가져오기
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.setView([lat, lng], 17);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map).bindPopup("내 위치").openPopup();
            });
        }
    }

    // 2. 사진 촬영 및 프리뷰 처리
    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                currentImgBase64 = event.target.result;
                displayImage(currentImgBase64);
            };
            reader.readAsDataURL(file);
        }
    });

    function displayImage(base64) {
        const img = document.getElementById('photo-preview');
        const msg = document.getElementById('photo-msg');
        img.src = base64;
        img.style.display = 'block';
        msg.style.display = 'none';
    }

    // 3. 데이터 저장 (LocalStorage)
    function saveData() {
        const loc = document.getElementById('loc-input').value;
        const memo = document.getElementById('memo-input').value;
        const now = new Date().toLocaleString();

        const parkingData = {
            location: loc,
            memo: memo,
            time: now,
            photo: currentImgBase64,
            lat: marker ? marker.getLatLng().lat : 37.5665,
            lng: marker ? marker.getLatLng().lng : 126.9780
        };

        localStorage.setItem('parkNoteData', JSON.stringify(parkingData));
        document.getElementById('last-saved').textContent = "저장됨: " + now;
        showToast();
    }

    // 4. 저장된 데이터 불러오기
    function loadSavedData() {
        const saved = localStorage.getItem('parkNoteData');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('loc-input').value = data.location;
            document.getElementById('memo-input').value = data.memo;
            document.getElementById('last-saved').textContent = "마지막 기록: " + data.time;
            
            if (data.photo) {
                currentImgBase64 = data.photo;
                displayImage(data.photo);
            }

            if (data.lat && data.lng) {
                map.setView([data.lat, data.lng], 17);
                if (marker) map.removeLayer(marker);
                marker = L.marker([data.lat, data.lng]).addTo(map).bindPopup("저장된 위치").openPopup();
            }
        }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>

</body>
</html>
