<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ParkNote Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --primary: #4f8ef7; --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; 
            --muted: #64748b; --border: #e2e8f0; --accent: #eef4ff; --danger: #ff4d4d;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #2d3a4f; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow: hidden; }
        
        /* 사이드 메뉴 */
        .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); z-index: 2000; transition: 0.3s; box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 50px 20px; }
        .drawer.active { left: 0; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1900; }
        .drawer-overlay.active { display: block; }
        .menu-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px; }

        /* 헤더 */
        .header { display: flex; align-items: center; padding: 20px 20px 10px; gap: 15px; padding-top: calc(10px + env(safe-area-inset-top, 0px)); }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); padding: 5px; }
        .logo { font-family: 'Space Grotesk'; font-size: 22px; color: var(--primary); flex: 1; }

        .app-container { height: 100vh; overflow-y: auto; padding: 0 16px 220px; -webkit-overflow-scrolling: touch; }

        /* 카드 UI 개선 */
        .hero-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        .img-container { position: relative; width: 100%; margin-bottom: 12px; cursor: pointer; }
        .hero-img { width: 100%; height: 200px; border-radius: 16px; object-fit: cover; background: var(--accent); }
        .view-map-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(255,255,255,0.9); color: var(--primary); border: none; padding: 8px 14px; border-radius: 12px; font-size: 12px; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 4px; }

        #map { height: 180px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--border); background: var(--accent); z-index: 1; }

        /* 태그 및 입력 */
        .quick-tags { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tag-btn { background: var(--card); border: 1px solid var(--border); padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; white-space: nowrap; color: var(--muted); }
        
        .input-group { background: var(--card); border-radius: 22px; padding: 18px; border: 1px solid var(--border); }
        .input-field { width: 100%; border: none; background: transparent; padding: 12px 0; font-size: 16px; color: var(--text); border-bottom: 1px solid var(--border); margin-bottom: 12px; outline: none; }

        /* 이미지 확대 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; justify-content: center; align-items: center; }
        .modal img { max-width: 95%; max-height: 90%; border-radius: 8px; }
        .modal-close { position: absolute; top: 40px; right: 20px; color: white; font-size: 30px; font-weight: bold; cursor: pointer; }

        .bottom-action { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 16px calc(20px + var(--safe-bottom)); background: linear-gradient(to top, var(--bg) 80%, transparent); z-index: 1000; }
        .complete-btn { background: var(--primary); color: white; border: none; border-radius: 20px; width: 100%; padding: 18px; font-size: 18px; font-weight: 800; box-shadow: 0 10px 20px rgba(79, 142, 247, 0.3); cursor: pointer; }

        .toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="drawer" id="drawer">
    <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk'; color: var(--primary);">Menu</h2>
    <div class="menu-item" onclick="exportData()">📤 데이터 백업</div>
    <div class="menu-item" onclick="importData()">📥 데이터 불러오기</div>
    <div class="menu-item" onclick="clearData()" style="color: var(--danger);">🗑️ 전체 기록 삭제</div>
</div>

<div class="modal" id="imageModal" onclick="closeModal()">
    <span class="modal-close">&times;</span>
    <img id="modalImg">
</div>

<header class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">ParkNote</div>
    <div id="gps-status" style="font-size: 10px; font-weight: 700; color: var(--muted);">GPS 확인 중</div>
</header>

<div class="app-container">
    <div id="hero-area">
        <div class="hero-card" style="text-align: center; color: var(--muted); padding: 40px;">주차 기록이 없습니다.</div>
    </div>
    <div id="map"></div>
    <section>
        <div class="quick-tags">
            <button class="tag-btn" onclick="quickFillFloor('지하 1층')">B1</button>
            <button class="tag-btn" onclick="quickFillFloor('지하 2층')">B2</button>
            <button class="tag-btn" onclick="quickFillFloor('지하 3층')">B3</button>
            <button class="tag-btn" onclick="quickFill('엘리베이터 앞')">엘베앞</button>
        </div>
        <div class="input-group">
            <input class="input-field" id="loc-input" placeholder="주차 위치 입력">
            <input class="input-field" id="memo-input" placeholder="메모 추가">
            <button style="background:var(--accent); color:var(--primary); border:none; padding:14px; border-radius:12px; width:100%; font-weight:700;" onclick="triggerCamera()">📷 사진 촬영</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
    </section>
</div>

<div class="bottom-action">
    <button class="complete-btn" onclick="saveData()">주차 완료</button>
</div>
<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];
    let historyMarker;

    window.addEventListener('DOMContentLoaded', () => {
        initMap();
        loadHistory();
        setInterval(render, 60000); // 1분마다 시간 업데이트를 위해 리렌더링
    });

    function toggleMenu() {
        document.getElementById('drawer').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function initMap() {
        try {
            map = L.map('map', { zoomControl: false }).setView([37.56, 126.97], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    if (!marker) {
                        marker = L.marker([lat, lng]).addTo(map);
                        map.setView([lat, lng], 17);
                    } else { marker.setLatLng([lat, lng]); }
                    document.getElementById('gps-status').textContent = "● GPS 수신 중";
                    document.getElementById('gps-status').style.color = "#22c55e";
                }, null, { enableHighAccuracy: true });
            }
        } catch (e) {}
    }

    function quickFillFloor(val) {
        const input = document.getElementById('loc-input');
        const floors = ['지하 1층', '지하 2층', '지하 3층', '지상 1층'];
        let txt = input.value;
        floors.forEach(f => { txt = txt.replace(f, "").trim(); });
        input.value = (val + " " + txt).trim();
    }

    function quickFill(val) {
        const input = document.getElementById('loc-input');
        if (!input.value.includes(val)) input.value = (input.value + " " + val).trim();
    }

    function triggerCamera() { document.getElementById('camera-input').click(); }

    document.getElementById('camera-input').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX = 800;
                let w = img.width, h = img.height;
                if (w > MAX) { h *= MAX / w; w = MAX; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                currentImgBase64 = canvas.toDataURL('image/jpeg', 0.5);
                showToast("✅ 사진 준비 완료");
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    };

    function saveData() {
        if (!marker) return showToast("GPS 신호를 기다려주세요.");
        const now = new Date();
        const record = {
            id: Date.now(),
            timestamp: now.getTime(),
            formattedTime: `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`,
            location: document.getElementById('loc-input').value || "주차장",
            memo: document.getElementById('memo-input').value || "",
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(record);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkHistory', JSON.stringify(parkingHistory));
        render();
        showToast("✅ 저장되었습니다.");
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        currentImgBase64 = "";
    }

    function getElapsedText(timestamp) {
        const diff = Date.now() - timestamp;
        const mins = Math.floor(diff / 60000);
        const hours = Math.floor(mins / 60);
        if (hours > 0) return `${hours}시간 ${mins % 60}분 전 주차`;
        return `${mins}분 전 주차`;
    }

    function render() {
        const area = document.getElementById('hero-area');
        if (parkingHistory.length === 0) return;
        const item = parkingHistory[0];
        const elapsed = getElapsedText(item.timestamp);
        
        area.innerHTML = `
            <div class="hero-card">
                <div style="font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 8px;">⏱ ${elapsed} (${item.formattedTime})</div>
                <div class="img-container">
                    ${item.photo ? `<img src="${item.photo}" class="hero-img" onclick="openModal('${item.photo}')">` : '<div class="hero-img" style="display:flex; align-items:center; justify-content:center; color:var(--muted)">사진 없음</div>'}
                    <button class="view-map-btn" onclick="focusParkingLocation(${item.lat}, ${item.lng})">📍 위치 확인</button>
                </div>
                <h2 style="font-size: 22px; font-weight: 800;">${item.location}</h2>
                <p style="color:var(--muted); font-size: 14px;">${item.memo}</p>
            </div>
        `;
    }

    function focusParkingLocation(lat, lng) {
        if (historyMarker) map.removeLayer(historyMarker);
        historyMarker = L.circleMarker([lat, lng], { color: '#ff4d4d', radius: 10 }).addTo(map);
        map.setView([lat, lng], 18);
        showToast("📍 주차 위치로 이동했습니다.");
    }

    function openModal(src) {
        document.getElementById('modalImg').src = src;
        document.getElementById('imageModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('imageModal').style.display = 'none';
    }

    function exportData() {
        const data = localStorage.getItem('parkHistory');
        if(!data) return;
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `parknote_backup.json`;
        a.click();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const f = e.target.files[0];
            const r = new FileReader();
            r.onload = ev => { localStorage.setItem('parkHistory', ev.target.result); location.reload(); };
            r.readAsText(f);
        };
        input.click();
    }

    function clearData() { if(confirm("삭제하시겠습니까?")) { localStorage.clear(); location.reload(); } }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.textContent = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkHistory');
        if (saved) { parkingHistory = JSON.parse(saved); render(); }
    }
</script>
</body>
</html>
