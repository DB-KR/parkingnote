<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@700&display=swap');
        
        :root {
            --primary: #4f8ef7; --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; 
            --muted: #64748b; --border: #e2e8f0; --accent: #eef4ff; --danger: #ff4d4d;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #2d3a4f; }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow: hidden; }
        
        /* 사이드 메뉴 스타일 */
        .drawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: 0.3s;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 40px 20px;
        }
        .drawer.active { left: 0; }
        .drawer-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 1900;
        }
        .drawer-overlay.active { display: block; }
        .menu-item {
            padding: 15px; border-radius: 12px; margin-bottom: 8px;
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 12px;
        }
        .menu-item:active { background: var(--accent); }

        /* 헤더 */
        .header { display: flex; align-items: center; padding: 20px; gap: 15px; }
        .menu-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }
        .logo { font-family: 'Space Grotesk'; font-size: 22px; color: var(--primary); flex: 1; }

        .app-container { height: 100vh; overflow-y: auto; padding: 0 16px 140px; }

        /* 메인 카드 및 지도 */
        .hero-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .hero-img { width: 100%; height: 180px; border-radius: 16px; object-fit: cover; margin-bottom: 12px; }
        #map { height: 160px; border-radius: 16px; margin-bottom: 20px; border: 1px solid var(--border); }

        /* 입력 UI */
        .quick-tags { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tag-btn { background: var(--card); border: 1px solid var(--border); padding: 8px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; white-space: nowrap; color: var(--muted); transition: 0.2s; }
        .tag-btn:active { background: var(--primary); color: white; }
        
        .input-group { background: var(--card); border-radius: 20px; padding: 16px; border: 1px solid var(--border); }
        .input-field { width: 100%; border: none; background: transparent; padding: 12px 0; font-size: 16px; color: var(--text); border-bottom: 1px solid var(--border); margin-bottom: 10px; outline: none; }

        /* 하단 고정 버튼 */
        .bottom-action {
            position: fixed; bottom: 0; left: 0; width: 100%;
            padding: 20px 16px 35px; background: linear-gradient(to top, var(--bg) 80%, transparent);
            z-index: 1000;
        }
        .complete-btn {
            background: var(--primary); color: white; border: none; border-radius: 18px;
            width: 100%; padding: 18px; font-size: 18px; font-weight: 800;
            box-shadow: 0 8px 20px rgba(79, 142, 247, 0.3); cursor: pointer;
        }
        .complete-btn:active { transform: scale(0.98); background: #3a7bd5; }

        .toast { position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 30px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 3000; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="drawer" id="drawer">
    <h2 style="margin-bottom: 30px; font-family: 'Space Grotesk'; color: var(--primary);">Menu</h2>
    <div class="menu-item" onclick="exportData()">📤 데이터 백업 (JSON)</div>
    <div class="menu-item" onclick="importData()">📥 데이터 불러오기</div>
    <div class="menu-item" onclick="clearData()" style="color: var(--danger);">🗑️ 전체 기록 삭제</div>
</div>

<header class="header">
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
    <div class="logo">ParkNote</div>
    <div id="gps-status" style="font-size: 10px; color: var(--muted);">GPS 확인 중...</div>
</header>

<div class="app-container">
    <div id="hero-area">
        <div class="hero-card" style="text-align: center; color: var(--muted); padding: 40px;">최근 주차 기록이 없습니다.</div>
    </div>

    <div id="map"></div>

    <section>
        <div class="quick-tags">
            <button class="tag-btn" onclick="quickFillFloor('지하 1층')">B1</button>
            <button class="tag-btn" onclick="quickFillFloor('지하 2층')">B2</button>
            <button class="tag-btn" onclick="quickFillFloor('지하 3층')">B3</button>
            <button class="tag-btn" onclick="quickFillFloor('지상 1층')">1F</button>
            <button class="tag-btn" onclick="quickFill('엘리베이터 앞')">엘베앞</button>
        </div>

        <div class="input-group">
            <input class="input-field" id="loc-input" placeholder="주차 위치 (예: B2 G-10)">
            <input class="input-field" id="memo-input" placeholder="추가 메모 (선택)">
            <button style="background:var(--accent); color:var(--primary); border:none; padding:12px; border-radius:12px; width:100%; font-weight:700; margin-top:5px;" onclick="document.getElementById('camera-input').click()">📷 사진 촬영</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
    </section>
</div>

<div class="bottom-action">
    <button class="complete-btn" onclick="saveData()">주차 완료</button>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    window.onload = function() {
        initMap();
        loadHistory();
        Notification.requestPermission();
    };

    function toggleMenu() {
        document.getElementById('drawer').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.56, 126.97], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude: lat, longitude: lng } = pos.coords;
                if (!marker) { marker = L.marker([lat, lng]).addTo(map); map.setView([lat, lng], 17); }
                else { marker.setLatLng([lat, lng]); }
                document.getElementById('gps-status').textContent = "● GPS 수신 중";
                document.getElementById('gps-status').style.color = "#22c55e";
            }, null, { enableHighAccuracy: true });
        }
    }

    // [개선] 층수 태그 전용 입력 (기존 층수 정보가 있으면 교체함)
    function quickFillFloor(val) {
        const input = document.getElementById('loc-input');
        const floors = ['지하 1층', '지하 2층', '지하 3층', '지상 1층'];
        let currentVal = input.value;
        
        // 기존 입력값에서 층수 키워드가 있는지 확인 후 교체
        floors.forEach(f => {
            currentVal = currentVal.replace(f, "").trim();
        });
        
        input.value = (val + " " + currentVal).trim();
    }

    function quickFill(val) {
        const input = document.getElementById('loc-input');
        if (!input.value.includes(val)) {
            input.value = (input.value + " " + val).trim();
        }
    }

    document.getElementById('camera-input').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    showToast("📸 사진 촬영 완료");
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function saveData() {
        if (!marker) return showToast("GPS 신호를 기다려주세요.");
        const now = new Date();
        const record = {
            id: Date.now(), 
            timestamp: now.getTime(),
            // [개선] 연월일시 포맷팅
            formattedTime: `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}. ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`,
            location: document.getElementById('loc-input').value || "지하 주차장",
            memo: document.getElementById('memo-input').value || "",
            photo: currentImgBase64, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(record);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkHistory', JSON.stringify(parkingHistory));
        
        render();
        sendNotification(record);
        showToast("✅ 주차 정보 저장 완료!");
        
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        currentImgBase64 = "";
        if (navigator.vibrate) navigator.vibrate(70);
    }

    function render() {
        const area = document.getElementById('hero-area');
        if (parkingHistory.length === 0) return;
        const latest = parkingHistory[0];
        
        area.innerHTML = `
            <div class="hero-card">
                <div style="font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 8px;">🗓 ${latest.formattedTime}</div>
                ${latest.photo ? `<img src="${latest.photo}" class="hero-img">` : ''}
                <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 4px;">${latest.location}</h2>
                <p style="color:var(--muted); font-size: 14px;">${latest.memo}</p>
            </div>
        `;
    }

    function exportData() {
        const data = localStorage.getItem('parkHistory');
        if(!data) return showToast("내보낼 데이터가 없습니다.");
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `parknote_backup.json`;
        a.click();
        toggleMenu();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                localStorage.setItem('parkHistory', event.target.result);
                location.reload();
            };
            reader.readAsText(file);
        };
        input.click();
        toggleMenu();
    }

    function clearData() {
        if(confirm("모든 주차 기록을 삭제할까요?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function sendNotification(record) {
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(`🅿️ 주차 위치: ${record.location}`, {
                    body: `${record.formattedTime}에 기록되었습니다.`,
                    image: record.photo,
                    tag: 'parking-info',
                    requireInteraction: true
                });
            });
        }
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkHistory');
        if (saved) { parkingHistory = JSON.parse(saved); render(); }
    }
</script>
</body>
</html>
