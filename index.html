<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap');
        
        /* 화면 밖으로 튀어나가지 않게 방지 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --navy: #1a2744; --accent: #4f8ef7; --bg: #f4f6fb; 
            --card-bg: #fff; --text: #1a2744; --muted: #8892aa;
            --border: #e2e7f0; --radius: 16px; --danger: #e24b4a;
        }
        
        body { background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--text); overflow-x: hidden; }
        .phone-frame { max-width: 450px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }
        
        .header { background: var(--navy); padding: 20px; border-radius: 0 0 24px 24px; color: white; }
        .section { padding: 15px; }
        .section-label { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
        
        #map { height: 180px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 15px; z-index: 1; }
        
        .photo-container { 
            width: 100%; height: 150px; background: #e2e7f0; border-radius: var(--radius);
            margin-bottom: 8px; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 2px dashed var(--muted);
        }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .camera-trigger-btn {
            background: #fff; border: 1.5px solid var(--accent); color: var(--accent);
            border-radius: 12px; padding: 12px; width: 100%; font-weight: 600;
            margin-bottom: 20px; cursor: pointer; font-size: 14px;
        }
        
        /* 입력창 1줄씩 배치 및 너비 고정 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; width: 100%; }
        .input-box { 
            width: 100%; border: 1px solid var(--border); border-radius: 12px; 
            padding: 14px; font-size: 15px; outline: none; background: #fff;
            -webkit-appearance: none; /* 모바일 기본 스타일 제거 */
        }
        .input-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.1); }
        
        .save-btn {
            background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
            padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(79,142,247,0.2); margin-bottom: 30px;
        }

        .history-item { 
            background: var(--card-bg); border-radius: 12px; padding: 12px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); display: flex; gap: 12px; 
            position: relative; margin-bottom: 10px;
        }
        .history-img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .history-info { flex: 1; min-width: 0; /* 텍스트 넘침 방지 */ }
        .history-loc { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-time { font-size: 11px; color: var(--muted); }
        .delete-btn { 
            background: #fff1f1; color: var(--danger); border: none; 
            border-radius: 6px; padding: 4px 8px; font-size: 11px; cursor: pointer;
        }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--navy); color: #fff; padding: 12px 24px; border-radius: 20px;
            transition: transform 0.3s; z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="header">
        <h2 style="font-family:'Space Grotesk'">Park<span>Note</span> Pro</h2>
        <p id="gps-status" style="font-size:11px; opacity:0.8;">위치 탐색 중...</p>
    </div>

    <div class="section">
        <div id="map"></div>

        <div class="photo-container">
            <img id="photo-preview" src="">
            <div id="photo-msg" style="color:var(--muted); font-size: 14px;">사진 없음</div>
        </div>
        <button class="camera-trigger-btn" onclick="document.getElementById('camera-input').click()">
            📷 현장 사진 촬영
        </button>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

        <div class="input-group">
            <input class="input-box" id="loc-input" placeholder="주차 구역 (예: 지하 2층 C-04)">
            <input class="input-box" id="memo-input" placeholder="추가 메모 (예: 기둥 뒤)">
        </div>

        <button class="save-btn" onclick="saveData()">📍 주차 위치 기록하기</button>

        <div class="section-label">최근 기록</div>
        <div id="history-list"></div>
    </div>
</div>

<div class="toast" id="toast">기록되었습니다!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    window.onload = function() {
        initMap();
        loadHistory();
    };

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 17);
                } else {
                    marker.setLatLng([lat, lng]);
                }
                document.getElementById('gps-status').textContent = "위치 연결됨 (정확도: " + Math.round(pos.coords.accuracy) + "m)";
            }, null, { enableHighAccuracy: false, timeout: 5000 });
        }
    }

    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 400; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('photo-preview').src = currentImgBase64;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('photo-msg').style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function saveData() {
        if (!marker) { alert("위치를 잡는 중입니다."); return; }
        const newRecord = {
            id: Date.now(),
            location: document.getElementById('loc-input').value || "미지정",
            memo: document.getElementById('memo-input').value || "",
            time: new Date().toLocaleString(),
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(newRecord);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast();
        
        // 초기화
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        document.getElementById('photo-preview').style.display = 'none';
        document.getElementById('photo-msg').style.display = 'block';
        currentImgBase64 = "";
    }

    function renderHistory() {
        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = "";
        if (parkingHistory.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:#8892aa; font-size:13px; padding:20px;'>기록 없음</p>";
            return;
        }
        parkingHistory.forEach(item => {
            const card = document.createElement('div');
            card.className = 'history-item';
            card.onclick = () => { map.setView([item.lat, item.lng], 18); window.scrollTo(0,0); };
            card.innerHTML = `
                <img src="${item.photo || 'https://via.placeholder.com/60'}" class="history-img">
                <div class="history-info">
                    <div class="history-time">${item.time}</div>
                    <div class="history-loc">${item.location}</div>
                    <div style="font-size:11px; color:#4f8ef7; overflow:hidden; text-overflow:ellipsis;">${item.memo}</div>
                </div>
                <button class="delete-btn" onclick="deleteRecord(event, ${item.id})">삭제</button>
            `;
            listDiv.appendChild(card);
        });
    }

    function deleteRecord(event, id) {
        event.stopPropagation();
        if (confirm("삭제할까요?")) {
            parkingHistory = parkingHistory.filter(item => item.id !== id);
            localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            renderHistory();
        }
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkNoteHistory');
        if (saved) { parkingHistory = JSON.parse(saved); renderHistory(); }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
