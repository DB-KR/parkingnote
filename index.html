<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #4f8ef7; --primary-dark: #3a6ed1;
            --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; --muted: #64748b;
            --border: #e2e8f0; --radius: 20px; --danger: #ff4d4d;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
                --border: #334155;
            }
        }

        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow-x: hidden; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 24px; color: var(--primary); }
        .gps-badge { font-size: 11px; padding: 4px 10px; background: var(--card); border-radius: 20px; color: var(--muted); border: 1px solid var(--border); }

        .map-wrapper { padding: 0 15px; margin-bottom: 20px; }
        #map { height: 180px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1; }

        .input-section { padding: 0 15px; }
        .photo-card { 
            width: 100%; height: 160px; background: var(--card); border-radius: var(--radius);
            margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 2px dashed var(--border); position: relative;
        }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cam-btn { 
            position: absolute; bottom: 12px; right: 12px; background: var(--primary); color: white;
            border: none; padding: 10px 18px; border-radius: 30px; font-weight: 600; font-size: 13px;
            box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3); cursor: pointer;
        }

        .field-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .input-field { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 14px; font-size: 15px; color: var(--text); outline: none; transition: 0.2s;
        }
        
        /* 알람 설정 영역 */
        .alarm-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; background: var(--card); padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
        .alarm-label { font-size: 13px; font-weight: 600; color: var(--muted); flex-shrink: 0; }
        .alarm-select { flex: 1; border: none; background: none; font-size: 15px; color: var(--primary); font-weight: 700; outline: none; cursor: pointer; }

        .save-btn {
            background: var(--primary); color: white; border: none; border-radius: 18px;
            padding: 18px; width: 100%; font-size: 17px; font-weight: 700; cursor: pointer;
            box-shadow: 0 8px 16px rgba(79, 142, 247, 0.2);
        }

        .history-section { padding: 30px 15px; }
        .history-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 15px; text-transform: uppercase; }
        .history-card { 
            background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px;
            display: flex; gap: 15px; align-items: center; border: 1px solid var(--border);
        }

        .h-img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: var(--bg); }
        .h-content { flex: 1; min-width: 0; }
        .h-loc { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .h-meta { font-size: 11px; color: var(--muted); }
        .h-alarm { font-size: 11px; color: var(--danger); font-weight: 600; margin-top: 2px; }
        
        .del-btn { background: none; border: none; color: var(--danger); font-size: 11px; cursor: pointer; opacity: 0.5; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--text); color: var(--bg); padding: 12px 25px; border-radius: 30px;
            font-size: 14px; font-weight: 600; transition: 0.3s; z-index: 9999;
            display: flex; align-items: center; justify-content: center; text-align: center; min-width: 220px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>ParkNote<span>Pro</span></h1>
        <div class="gps-badge" id="gps-status">GPS 확인 중...</div>
    </header>

    <main>
        <div class="map-wrapper"><div id="map"></div></div>

        <section class="input-section">
            <div class="photo-card">
                <img id="photo-preview" src="">
                <div id="photo-msg" style="color:var(--muted); font-weight:600;">현장 사진 없음</div>
                <button class="cam-btn" onclick="document.getElementById('camera-input').click()">📷 촬영하기</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

            <div class="field-group">
                <input class="input-field" id="loc-input" placeholder="주차 구역 (예: 지하 1층 A-05)">
                <input class="input-field" id="memo-input" placeholder="메모 (예: 기둥 뒤)">
            </div>

            <div class="alarm-row">
                <span class="alarm-label">⏰ 주차 알람</span>
                <select class="alarm-select" id="alarm-timer">
                    <option value="0">알람 없음</option>
                    <option value="30">30분 뒤</option>
                    <option value="60">1시간 뒤</option>
                    <option value="120">2시간 뒤</option>
                    <option value="180">3시간 뒤</option>
                </select>
            </div>

            <button class="save-btn" onclick="saveData()">📍 주차 정보 저장</button>
        </section>

        <section class="history-section">
            <div class="history-title">최근 주차 기록</div>
            <div id="history-list"></div>
        </section>
    </main>
</div>

<div class="toast" id="toast">기록이 안전하게 저장되었습니다</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    window.onload = function() {
        initMap();
        loadHistory();
        checkExistingAlarms(); // 앱 켤 때 지난 알림 있는지 확인
    };

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 17);
                } else { marker.setLatLng([lat, lng]); }
                document.getElementById('gps-status').textContent = "연결됨 (" + Math.round(pos.coords.accuracy) + "m)";
            }, null, { enableHighAccuracy: false, timeout: 5000 });
        }
    }

    // 사진 압축 및 처리
    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; 
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photo-preview').src = currentImgBase64;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('photo-msg').style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function saveData() {
        if (!marker) { alert("GPS 수신 대기 중..."); return; }
        
        const alarmMinutes = parseInt(document.getElementById('alarm-timer').value);
        let alarmTime = null;
        if (alarmMinutes > 0) {
            alarmTime = Date.now() + (alarmMinutes * 60 * 1000);
        }

        const newRecord = {
            id: Date.now(),
            location: document.getElementById('loc-input').value || "미지정 구역",
            memo: document.getElementById('memo-input').value || "",
            time: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng,
            alarmTime: alarmTime,
            alarmDone: false
        };

        parkingHistory.unshift(newRecord);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast("기록이 안전하게 저장되었습니다");
        
        // 초기화
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        document.getElementById('alarm-timer').value = "0";
        document.getElementById('photo-preview').style.display = 'none';
        document.getElementById('photo-msg').style.display = 'block';
        currentImgBase64 = "";
    }

    // 알람 체크 루프 (1분마다 확인)
    setInterval(checkAlarms, 30000);

    function checkAlarms() {
        const now = Date.now();
        let changed = false;
        parkingHistory.forEach(item => {
            if (item.alarmTime && !item.alarmDone && now > item.alarmTime) {
                alert(`🔔 주차 알람!\n[${item.location}] 주차하신 지 시간이 지났습니다.`);
                item.alarmDone = true;
                changed = true;
            }
        });
        if (changed) {
            localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            renderHistory();
        }
    }

    function checkExistingAlarms() { checkAlarms(); }

    function renderHistory() {
        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = "";
        if (parkingHistory.length === 0) {
            listDiv.innerHTML = "<div style='text-align:center; color:var(--muted); padding:40px; font-size:13px;'>저장된 기록이 없습니다.</div>";
            return;
        }
        parkingHistory.forEach(item => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.onclick = () => { map.setView([item.lat, item.lng], 18); window.scrollTo({top:0, behavior:'smooth'}); };
            
            let alarmText = "";
            if (item.alarmTime) {
                const aDate = new Date(item.alarmTime);
                alarmText = `<div class="h-alarm">⏰ 알람: ${aDate.getHours()}:${aDate.getMinutes().toString().padStart(2, '0')} ${item.alarmDone ? '(종료)' : ''}</div>`;
            }

            card.innerHTML = `
                <img src="${item.photo || 'https://via.placeholder.com/100'}" class="h-img">
                <div class="h-content">
                    <div class="h-meta">${item.time}</div>
                    <div class="h-loc">${item.location}</div>
                    <div class="h-memo" style="font-size:12px; color:var(--primary);">${item.memo}</div>
                    ${alarmText}
                </div>
                <button class="del-btn" onclick="deleteRecord(event, ${item.id})">삭제</button>
            `;
            listDiv.appendChild(card);
        });
    }

    function deleteRecord(event, id) {
        event.stopPropagation();
        if (confirm("삭제하시겠습니까?")) {
            parkingHistory = parkingHistory.filter(item => item.id !== id);
            localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            renderHistory();
        }
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkNoteHistory');
        if (saved) { parkingHistory = JSON.parse(saved); renderHistory(); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
