<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #4f8ef7; --primary-dark: #3a6ed1;
            --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; --muted: #64748b;
            --border: #e2e8f0; --radius: 20px; --danger: #ff4d4d;
        }

        /* 다크모드 대응 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
                --border: #334155;
            }
        }

        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow-x: hidden; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }

        /* 헤더 디자인 */
        .header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 24px; color: var(--primary); }
        .gps-badge { font-size: 11px; padding: 4px 10px; background: var(--card); border-radius: 20px; color: var(--muted); border: 1px solid var(--border); }

        /* 지도 카드 */
        .map-wrapper { padding: 0 15px; margin-bottom: 20px; }
        #map { height: 200px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1; }

        /* 입력 섹션 */
        .input-section { padding: 0 15px; }
        .photo-card { 
            width: 100%; height: 180px; background: var(--card); border-radius: var(--radius);
            margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 2px dashed var(--border); position: relative;
        }
        #photo-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .cam-btn { 
            position: absolute; bottom: 12px; right: 12px; background: var(--primary); color: white;
            border: none; padding: 10px 18px; border-radius: 30px; font-weight: 600; font-size: 13px;
            box-shadow: 0 4px 12px rgba(79, 142, 247, 0.3); cursor: pointer;
        }

        .field-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .input-field { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 16px; font-size: 16px; color: var(--text); outline: none; transition: 0.2s;
        }
        .input-field:focus { border-color: var(--primary); ring: 2px rgba(79,142,247,0.1); }

        .save-btn {
            background: var(--primary); color: white; border: none; border-radius: 18px;
            padding: 18px; width: 100%; font-size: 17px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s; box-shadow: 0 8px 16px rgba(79, 142, 247, 0.2);
        }
        .save-btn:active { transform: scale(0.98); }

        /* 히스토리 섹션 */
        .history-section { padding: 30px 15px; }
        .history-title { font-size: 14px; font-weight: 700; color: var(--muted); margin-bottom: 15px; letter-spacing: 0.5px; }
        .history-card { 
            background: var(--card); border-radius: 18px; padding: 15px; margin-bottom: 12px;
            display: flex; gap: 15px; align-items: center; border: 1px solid var(--border);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .h-img { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; background: var(--bg); }
        .h-content { flex: 1; min-width: 0; }
        .h-loc { font-size: 15px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .h-meta { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
        .h-memo { font-size: 12px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .del-btn { background: none; border: none; color: var(--danger); font-size: 12px; padding: 5px; cursor: pointer; opacity: 0.6; }

        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--text); color: var(--bg); padding: 12px 25px; border-radius: 30px;
            font-size: 14px; font-weight: 600; transition: 0.3s; z-index: 9999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>ParkNote<span>Pro</span></h1>
        <div class="gps-badge" id="gps-status">GPS 확인 중...</div>
    </header>

    <main>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <section class="input-section">
            <div class="photo-card">
                <img id="photo-preview" src="">
                <div id="photo-msg" style="color:var(--muted); font-weight:600;">현장 사진 없음</div>
                <button class="cam-btn" onclick="document.getElementById('camera-input').click()">📷 촬영하기</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

            <div class="field-group">
                <input class="input-field" id="loc-input" placeholder="주차 구역 (예: 지하 1층 A-05)">
                <input class="input-field" id="memo-input" placeholder="메모 (예: 기둥 뒤, 엘베 근처)">
            </div>

            <button class="save-btn" onclick="saveData()">📍 현재 위치 기록하기</button>
        </section>

        <section class="history-section">
            <div class="history-title">최근 주차 기록</div>
            <div id="history-list"></div>
        </section>
    </main>
</div>

<div class="toast" id="toast">기록이 안전하게 저장되었습니다</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    window.onload = function() {
        initMap();
        loadHistory();
    };

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 17);
                } else {
                    marker.setLatLng([lat, lng]);
                }
                document.getElementById('gps-status').textContent = "연결됨 (" + Math.round(pos.coords.accuracy) + "m)";
            }, null, { enableHighAccuracy: false, timeout: 5000 });
        }
    }

    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('photo-preview').src = currentImgBase64;
                    document.getElementById('photo-preview').style.display = 'block';
                    document.getElementById('photo-msg').style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function saveData() {
        if (!marker) { alert("GPS 수신을 기다려주세요."); return; }
        const newRecord = {
            id: Date.now(),
            location: document.getElementById('loc-input').value || "미지정 구역",
            memo: document.getElementById('memo-input').value || "",
            time: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(newRecord);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast();
        
        // 입력 폼 초기화
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        document.getElementById('photo-preview').style.display = 'none';
        document.getElementById('photo-msg').style.display = 'block';
        currentImgBase64 = "";
    }

    function renderHistory() {
        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = "";
        if (parkingHistory.length === 0) {
            listDiv.innerHTML = "<div style='text-align:center; color:var(--muted); padding:40px; font-size:14px;'>저장된 기록이 없습니다.</div>";
            return;
        }
        parkingHistory.forEach(item => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.onclick = () => { map.setView([item.lat, item.lng], 18); window.scrollTo({top:0, behavior:'smooth'}); };
            card.innerHTML = `
                <img src="${item.photo || 'https://via.placeholder.com/100'}" class="h-img">
                <div class="h-content">
                    <div class="h-meta">${item.time}</div>
                    <div class="h-loc">${item.location}</div>
                    <div class="h-memo">${item.memo}</div>
                </div>
                <button class="del-btn" onclick="deleteRecord(event, ${item.id})">삭제</button>
            `;
            listDiv.appendChild(card);
        });
    }

    function deleteRecord(event, id) {
        event.stopPropagation();
        if (confirm("이 기록을 삭제하시겠습니까?")) {
            parkingHistory = parkingHistory.filter(item => item.id !== id);
            localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            renderHistory();
        }
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkNoteHistory');
        if (saved) { parkingHistory = JSON.parse(saved); renderHistory(); }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
