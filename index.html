<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Grotesk:wght@600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        
        :root {
            --primary: #4f8ef7; --primary-dark: #3a6ed1; --bg: #f8f9fd; --card: #ffffff; 
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 20px; --danger: #ff4d4d;
        }

        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; }
        }

        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 30px; }

        /* 헤더 */
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 24px; color: var(--primary); }
        .gps-badge { font-size: 11px; padding: 4px 10px; background: var(--card); border-radius: 20px; color: var(--muted); border: 1px solid var(--border); transition: 0.2s; }
        .gps-badge.ready { color: #fff; background: #22c55e; border-color: #22c55e; }

        /* 지도 (사이즈 확대) */
        .map-wrapper { padding: 0 15px; margin-bottom: 15px; }
        #map { height: 240px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1; }

        /* 입력 폼 */
        .input-section { padding: 0 15px; }
        .field-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .input-field { 
            background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 14px 16px; font-size: 16px; color: var(--text); outline: none; transition: 0.2s; -webkit-appearance: none;
        }
        .input-field:focus { border-color: var(--primary); }
        
        /* 알람 & 촬영 버튼 행 */
        .action-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .alarm-box { flex: 1; background: var(--card); padding: 10px 12px; border-radius: 15px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .alarm-select { border: none; background: none; font-size: 14px; color: var(--muted); font-weight: 600; outline: none; cursor: pointer; }
        .alarm-select:not([value="0"]) { color: var(--primary); }
        
        .cam-btn { 
            background: var(--primary); color: white; border: none; 
            padding: 12px 18px; border-radius: 15px; font-weight: 600; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; gap: 6px; position: relative;
        }
        .cam-done::after { content: '✔'; position: absolute; top: -5px; right: -5px; background: #22c55e; color: white; font-size: 9px; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }

        .save-btn {
            background: var(--primary); color: white; border: none; border-radius: 18px;
            padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: 0.1s; box-shadow: 0 6px 16px rgba(79, 142, 247, 0.2);
        }
        .save-btn:active { transform: scale(0.98); }

        /* 히스토리 섹션 */
        .history-section { padding: 25px 0; }
        .section-header { padding: 0 20px; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* 가장 최근 기록 강조 (크게) */
        .latest-record { padding: 0 15px 25px; cursor: pointer; }
        .latest-card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1.5px solid var(--primary); box-shadow: 0 10px 30px rgba(79,142,247,0.1); }
        .latest-img { width: 100%; height: 160px; border-radius: 12px; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--border); }
        .latest-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .latest-time { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
        .latest-memo { font-size: 14px; color: var(--primary); font-weight: 600; background: rgba(79,142,247,0.08); padding: 10px; border-radius: 10px; }

        /* 이전 기록 리스트 (슬라이드 삭제) */
        .history-list { overflow: hidden; padding: 0 15px; }
        .history-item-container { position: relative; margin-bottom: 10px; border-radius: 15px; background: var(--danger); overflow: hidden; }
        .history-card { 
            background: var(--card); border-radius: 15px; padding: 12px;
            display: flex; gap: 12px; align-items: center; border: 1px solid var(--border);
            position: relative; z-index: 2; transition: transform 0.3s ease-out; cursor: pointer;
        }
        /* 삭제 상태 */
        .history-item-container.swiped .history-card { transform: translateX(-80px); }
        
        .h-img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; background: var(--bg); border: 1px solid var(--border); }
        .h-content { flex: 1; min-width: 0; }
        .h-loc { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .h-meta { font-size: 11px; color: var(--muted); }
        
        /* 실제 삭제 버튼 */
        .swipe-delete-btn {
            position: absolute; top: 0; right: 0; height: 100%; width: 80px;
            background: var(--danger); color: white; border: none; font-size: 14px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; z-index: 1; cursor: pointer;
        }

        /* 사진 크게 보기 오버레이 */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 10000; display: none; align-items: center; justify-content: center; cursor: pointer;
            animation: fadeIn 0.2s;
        }
        #lightbox-img { max-width: 95%; max-height: 90%; border-radius: 8px; box-shadow: 0 0 20px rgba(255,255,255,0.1); border: 1px solid #333; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 토스트 */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(30, 41, 59, 0.95); color: #fff; padding: 12px 25px; border-radius: 30px;
            font-size: 14px; font-weight: 600; transition: 0.3s; z-index: 9999;
            display: flex; align-items: center; justify-content: center; text-align: center; min-width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>ParkNote<span>Pro</span></h1>
        <div class="gps-badge" id="gps-status">GPS 수신 중...</div>
    </header>

    <main>
        <div class="map-wrapper"><div id="map"></div></div>

        <section class="input-section">
            <div class="field-group">
                <input class="input-field" id="loc-input" placeholder="주차 구역 (예: 지하 1층 B-08)">
                <input class="input-field" id="memo-input" placeholder="추가 메모 (기둥 뒤, 엘베 앞)">
            </div>

            <div class="action-row">
                <div class="alarm-box">
                    <span>⏰</span>
                    <select class="alarm-select" id="alarm-timer" onchange="this.setAttribute('value', this.value)">
                        <option value="0">알람 없음</option>
                        <option value="30">30분 뒤 알람</option>
                        <option value="60">1시간 뒤 알람</option>
                        <option value="120">2시간 뒤 알람</option>
                    </select>
                </div>
                <button class="cam-btn" id="cam-btn" onclick="document.getElementById('camera-input').click()">📷 촬영하기</button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

            <button class="save-btn" onclick="saveData()">📍 현재 위치 기록하기</button>
        </section>

        <section class="history-section">
            <div id="latest-record-area"></div>
            <div id="previous-history-area" style="display:none;">
                <div class="section-header">이전 기록</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </section>
    </main>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img" src="">
</div>

<div class="toast" id="toast">기록이 안전하게 저장되었습니다</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    // 슬라이드 삭제 터치 관리
    let touchStartX = 0;
    let touchMoveX = 0;
    let currentSwipedItem = null;

    window.onload = function() {
        initMap();
        loadHistory();
        checkAlarmsLoop();
    };

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 17);
                } else { marker.setLatLng([lat, lng]); }
                const badge = document.getElementById('gps-status');
                badge.textContent = "연결됨 (" + Math.round(pos.coords.accuracy) + "m)";
                badge.classList.add('ready');
            }, null, { enableHighAccuracy: false, timeout: 5000 });
        }
    }

    // 사진 처리 (압축 비율 강화)
    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const btn = document.getElementById('cam-btn');
            btn.textContent = "⌛ 압축 중...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; // 가로 크기 제한 강화
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.5); // 압축률 높임 (실패 방지)
                    btn.textContent = "📷 촬영 완료";
                    btn.classList.add('cam-done');
                };
            };
            reader.readAsDataURL(file);
        }
    });

    function saveData() {
        if (!marker) { showToast("GPS 수신 대기 중..."); return; }
        
        const alarmMinutes = parseInt(document.getElementById('alarm-timer').value);
        let alarmTime = null;
        if (alarmMinutes > 0) { alarmTime = Date.now() + (alarmMinutes * 60 * 1000); }

        const newRecord = {
            id: Date.now(),
            location: document.getElementById('loc-input').value || "미지정 주차 구역",
            memo: document.getElementById('memo-input').value || "추가 메모 없음",
            time: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            photo: currentImgBase64,
            lat: marker.getLatLng().lat,
            lng: marker.getLatLng().lng,
            alarmTime: alarmTime,
            alarmDone: false
        };

        // 기존 삭제 상태 초기화
        closeAnySwipedItem();

        parkingHistory.unshift(newRecord);
        if (parkingHistory.length > 10) parkingHistory.pop(); // 최대 10개로 증가
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast("주차 정보가 기록되었습니다");
        
        // 입력 폼 초기화
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        document.getElementById('alarm-timer').value = "0";
        document.getElementById('alarm-timer').setAttribute('value', '0');
        const btn = document.getElementById('cam-btn');
        btn.textContent = "📷 촬영하기";
        btn.classList.remove('cam-done');
        currentImgBase64 = "";
    }

    function renderHistory() {
        const latestDiv = document.getElementById('latest-record-area');
        const historyListDiv = document.getElementById('history-list');
        const prevHistoryDiv = document.getElementById('previous-history-area');
        latestDiv.innerHTML = "";
        historyListDiv.innerHTML = "";
        prevHistoryDiv.style.display = 'none';

        if (parkingHistory.length === 0) {
            latestDiv.innerHTML = "<div style='text-align:center; color:var(--muted); padding:40px; font-size:14px; background:var(--card); border-radius:15px; margin:0 15px; border:1px solid var(--border);'>저장된 기록이 없습니다.</div>";
            return;
        }

        // 1. 가장 최근 기록 (Dashboard UI)
        const latest = parkingHistory[0];
        const latestCard = document.createElement('div');
        latestCard.className = 'latest-card';
        latestCard.onclick = () => { map.setView([latest.lat, latest.lng], 18); window.scrollTo({top:0, behavior:'smooth'}); };

        let alarmText = "";
        if (latest.alarmTime && !latest.alarmDone) {
            const aDate = new Date(latest.alarmTime);
            alarmText = `<div class="latest-memo" style="color:var(--danger); margin-top:10px;">⏰ 알람: ${aDate.getHours()}:${aDate.getMinutes().toString().padStart(2, '0')}</div>`;
        }

        latestCard.innerHTML = `
            ${latest.photo ? `<img src="${latest.photo}" class="latest-img" onclick="openLightbox(event, '${latest.photo}')">` : ''}
            <div class="latest-title">${latest.location}</div>
            <div class="latest-time">${latest.time}📍 터치 시 지도 이동</div>
            <div class="latest-memo">${latest.memo}</div>
            ${alarmText}
        `;
        const latestWrapper = document.createElement('div');
        latestWrapper.className = 'latest-record';
        latestWrapper.appendChild(latestCard);
        latestDiv.appendChild(latestWrapper);

        // 2. 이전 기록 리스트 (슬라이드 삭제 적용)
        if (parkingHistory.length > 1) {
            prevHistoryDiv.style.display = 'block';
            for (let i = 1; i < parkingHistory.length; i++) {
                const item = parkingHistory[i];
                const container = document.createElement('div');
                container.className = 'history-item-container';
                container.setAttribute('data-id', item.id);

                // 카드 영역 (터치 이벤트 등록)
                const card = document.createElement('div');
                card.className = 'history-card';
                card.onclick = () => { if(!container.classList.contains('swiped')) { map.setView([item.lat, item.lng], 18); window.scrollTo({top:0, behavior:'smooth'}); }};
                
                addSwipeEvents(card, container); // 슬라이드 이벤트 등록

                card.innerHTML = `
                    <img src="${item.photo || 'https://via.placeholder.com/60'}" class="h-img" onclick="openLightbox(event, '${item.photo}')">
                    <div class="h-content">
                        <div class="h-meta">${item.time}</div>
                        <div class="h-loc">${item.location}</div>
                    </div>
                    ${item.alarmTime && !item.alarmDone ? '<div style="font-size:16px; margin-right:5px;">⏰</div>' : ''}
                    <div style="font-size:12px; color:var(--muted);">👉</div>
                `;
                
                // 실제 삭제 버튼
                const delBtn = document.createElement('button');
                delBtn.className = 'swipe-delete-btn';
                delBtn.textContent = "삭제";
                delBtn.onclick = (e) => deleteRecord(e, item.id);

                container.appendChild(card);
                container.appendChild(delBtn);
                historyListDiv.appendChild(container);
            }
        }
    }

    // --- 사진 크게 보기 (Lightbox) ---
    function openLightbox(event, imgBase64) {
        if(!imgBase64 || imgBase64.startsWith('https://via.placeholder')) return;
        event.stopPropagation(); // 카드 클릭 이벤트 발생 방지
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = imgBase64;
        lb.style.display = 'flex';
    }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

    // --- 슬라이드 삭제 로직 (Swipe to Delete) ---
    function addSwipeEvents(cardElement, containerElement) {
        cardElement.addEventListener('touchstart', (e) => {
            closeAnySwipedItem(); // 다른 열려있는 삭제 버튼 닫기
            touchStartX = e.touches[0].clientX;
            containerElement.style.transition = 'none'; // 터치 중엔 애니메이션 끔
        }, { passive: true });

        cardElement.addEventListener('touchmove', (e) => {
            touchMoveX = e.touches[0].clientX;
            let offset = touchMoveX - touchStartX;
            
            // 왼쪽으로 슬라이드할 때만 동작 (최대 80px)
            if (offset < 0 && offset > -120) {
                cardElement.style.transform = `translateX(${offset}px)`;
            }
        }, { passive: true });

        cardElement.addEventListener('touchend', (e) => {
            cardElement.style.transition = 'transform 0.3s ease-out';
            let offset = touchMoveX - touchStartX;
            
            // 40px 이상 밀었으면 삭제 버튼 열림 상태로 고정
            if (offset < -40) {
                containerElement.classList.add('swiped');
                cardElement.style.transform = 'translateX(-80px)';
                currentSwipedItem = containerElement;
            } else {
                // 아니면 다시 제자리로
                containerElement.classList.remove('swiped');
                cardElement.style.transform = 'translateX(0)';
            }
            touchMoveX = touchStartX; // 값 초기화
        });
    }

    function closeAnySwipedItem() {
        if (currentSwipedItem) {
            currentSwipedItem.classList.remove('swiped');
            currentSwipedItem.querySelector('.history-card').style.transform = 'translateX(0)';
            currentSwipedItem = null;
        }
    }

    // 화면 아무데나 터치하면 슬라이드된 거 닫기
    document.addEventListener('touchstart', (e) => {
        if (currentSwipedItem && !currentSwipedItem.contains(e.target)) {
            closeAnySwipedItem();
        }
    }, { passive: true });

    function deleteRecord(event, id) {
        event.stopPropagation();
        // 실제 스토어용 앱이라면 Haptic 피드백을 주면 좋음
        parkingHistory = parkingHistory.filter(item => item.id !== id);
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast("기록이 삭제되었습니다");
        currentSwipedItem = null;
    }

    // --- 기타 기능 (알람, 로드, 토스트) ---
    let alarmCheckTimer;
    function checkAlarmsLoop() {
        if(alarmCheckTimer) clearInterval(alarmCheckTimer);
        checkAlarms(); // 켜자마자 한번 확인
        alarmCheckTimer = setInterval(checkAlarms, 20000); // 20초마다 확인
    }

    function checkAlarms() {
        const now = Date.now();
        let changed = false;
        parkingHistory.forEach(item => {
            if (item.alarmTime && !item.alarmDone && now > item.alarmTime) {
                alert(`🔔 주차 알람!\n\n[${item.location}]\n\n주차하신 지 시간이 지났습니다.\n위치를 확인하세요.`);
                item.alarmDone = true;
                changed = true;
            }
        });
        if (changed) {
            localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            renderHistory();
        }
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkNoteHistory');
        if (saved) { parkingHistory = JSON.parse(saved); renderHistory(); }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
