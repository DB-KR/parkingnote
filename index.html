<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@600&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: pan-y; }
        
        :root {
            --primary: #4f8ef7; --primary-dark: #3a6ed1; --bg: #f8f9fd; --card: #ffffff; 
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 20px; --danger: #ff4d4d;
            --accent: #eef4ff;
        }

        @media (prefers-color-scheme: dark) {
            :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #2d3a4f; }
        }

        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 50px; }

        /* 헤더 */
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 24px; color: var(--primary); }
        .gps-badge { font-size: 11px; padding: 4px 10px; background: var(--card); border-radius: 20px; color: var(--muted); border: 1px solid var(--border); }
        .gps-badge.ready { color: #fff; background: #22c55e; border-color: #22c55e; }

        /* 지도 */
        .map-wrapper { padding: 0 15px; margin-bottom: 15px; }
        #map { height: 240px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1; }

        /* 입력 섹션 */
        .input-section { padding: 0 15px; }
        .main-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .fields-column { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .input-field { 
            width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 13px 15px; font-size: 15px; color: var(--text); outline: none;
        }

        .cam-btn-side { 
            width: 95px; background: var(--accent); color: var(--primary); border: 2px solid var(--primary); 
            border-radius: 15px; font-weight: 800; font-size: 14px;
            cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
            transition: 0.2s;
        }
        .cam-btn-side.cam-done { background: var(--primary); color: white; }

        .alarm-card { 
            background: var(--card); padding: 12px 15px; border-radius: 15px; border: 1px solid var(--border); 
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
        }
        .alarm-card label { font-size: 13px; font-weight: 700; color: var(--muted); white-space: nowrap; }
        .dt-picker { 
            border: none; background: none; font-family: inherit; font-size: 14px; color: var(--primary); 
            font-weight: 600; outline: none; flex: 1; text-align: right;
        }

        .save-btn {
            background: var(--primary); color: white; border: none; border-radius: 18px;
            padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 6px 16px rgba(79, 142, 247, 0.2);
        }

        /* 기록 카드 */
        .latest-record { padding: 25px 15px; }
        .elapsed-badge { background: var(--primary); color: white; padding: 6px 12px; border-radius: 12px; font-size: 15px; font-weight: 800; display: inline-block; margin-bottom: 12px; }
        .latest-card { background: var(--card); border-radius: var(--radius); padding: 22px; border: 2px solid var(--primary); box-shadow: 0 12px 30px rgba(79,142,247,0.15); }
        .latest-img { width: 100%; height: 180px; border-radius: 12px; object-fit: cover; margin-bottom: 15px; border: 1px solid var(--border); }
        .latest-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .latest-memo { font-size: 14px; color: var(--primary); font-weight: 600; background: var(--accent); padding: 12px; border-radius: 12px; }

        .history-section { padding-top: 10px; }
        .section-header { padding: 0 20px; font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; }
        .history-list { padding: 0 15px; }
        .history-item-container { position: relative; margin-bottom: 12px; border-radius: 18px; background: var(--danger); overflow: hidden; }
        .history-card { 
            background: var(--card); border-radius: 18px; padding: 12px; display: flex; gap: 15px; align-items: center; 
            border: 1px solid var(--border); position: relative; z-index: 2; transition: transform 0.3s;
        }
        .h-img { width: 55px; height: 55px; min-width: 55px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); }
        .h-content { flex: 1; min-width: 0; }
        .h-loc { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-meta { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
        .swipe-delete-btn { position: absolute; top: 0; right: 0; height: 100%; width: 85px; background: var(--danger); color: white; border: none; font-size: 14px; font-weight: 800; display: flex; align-items: center; justify-content: center; z-index: 1; }

        /* 배터리/안내 모달 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; max-width: 400px; width: 100%; text-align: center; }
        .modal-content h2 { font-size: 18px; margin-bottom: 15px; color: var(--primary); }
        .modal-content p { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 20px; }
        .modal-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; }

        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; }
        #lightbox-img { max-width: 95%; max-height: 90%; border-radius: 8px; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 14px; font-weight: 600; transition: 0.3s; z-index: 9999; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>ParkNote<span>Pro</span></h1>
        <div class="gps-badge" id="gps-status">GPS 대기 중...</div>
    </header>

    <main>
        <div class="map-wrapper"><div id="map"></div></div>

        <section class="input-section">
            <div class="main-input-row">
                <div class="fields-column">
                    <input class="input-field" id="loc-input" placeholder="주차 구역 (예: 지하 1층 B-08)">
                    <input class="input-field" id="memo-input" placeholder="메모 (예: 기둥 뒤)">
                </div>
                <button class="cam-btn-side" id="cam-btn" onclick="document.getElementById('camera-input').click()">
                    <span style="font-size:26px;">📷</span>
                    <span id="cam-text">촬영하기</span>
                </button>
            </div>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">

            <div class="alarm-card">
                <span>⏰</span>
                <label>출차 알람 설정</label>
                <input type="datetime-local" class="dt-picker" id="alarm-time-picker">
            </div>

            <button class="save-btn" onclick="saveData()">📍 주차 정보 저장</button>
        </section>

        <section class="history-section">
            <div id="latest-record-area"></div>
            <div id="previous-history-area" style="display:none;">
                <div class="section-header">이전 기록 (밀어서 삭제)</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </section>
    </main>
</div>

<div id="battery-modal" class="modal">
    <div class="modal-content">
        <h2>🔋 배터리 최적화 해제 안내</h2>
        <p>잠금화면에서 주차 정보를 실시간으로 확인하려면<br><b>[설정 > 앱 > ParkNote Pro > 배터리]</b>에서<br><b>'제한 없음'</b> 옵션을 선택해 주세요.</p>
        <button class="modal-btn" onclick="closeBatteryModal()">확인했습니다</button>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>
<div class="toast" id="toast">저장 완료</div>

<audio id="silent-audio" loop>
    <source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];
    let startX = 0, currentX = 0;

    window.onload = function() {
        initMap();
        loadHistory();
        checkBatteryOptimization();
        setInterval(updateTimeAndAlarms, 30000);
    };

    function triggerVibration(type) {
        if (!navigator.vibrate) return;
        if (type === 'success') navigator.vibrate(70);
        if (type === 'delete') navigator.vibrate([50, 50, 50]);
        if (type === 'notify') navigator.vibrate([500, 200, 500]);
    }

    function checkBatteryOptimization() {
        const isPWA = window.matchMedia('(display-mode: standalone)').matches;
        if (isPWA && !localStorage.getItem('battery_guide_shown')) {
            document.getElementById('battery-modal').style.display = 'flex';
        }
    }

    function closeBatteryModal() {
        localStorage.setItem('battery_guide_shown', 'true');
        document.getElementById('battery-modal').style.display = 'none';
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (!marker) { marker = L.marker([lat, lng]).addTo(map); map.setView([lat, lng], 17); }
                else { marker.setLatLng([lat, lng]); }
                document.getElementById('gps-status').textContent = "연결됨";
                document.getElementById('gps-status').classList.add('ready');
            }, null, { enableHighAccuracy: false });
        }
    }

    document.getElementById('camera-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            triggerVibration('success');
            document.getElementById('cam-text').textContent = "처리 중";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500;
                    let width = img.width, height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('cam-btn').classList.add('cam-done');
                    document.getElementById('cam-text').textContent = "촬영 완료";
                };
            };
            reader.readAsDataURL(file);
        }
    });

    async function updateMediaSession(record) {
        if ('mediaSession' in navigator) {
            try {
                const audio = document.getElementById('silent-audio');
                await audio.play();
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: `🅿️ 주차: ${record.location}`,
                    artist: `시간: ${calculateElapsed(record.timestamp)}`,
                    album: record.memo,
                    artwork: [{ src: record.photo || '', sizes: '512x512', type: 'image/jpeg' }]
                });
            } catch (err) { console.log("미디어 세션 활성화 실패"); }
        }
    }

    function saveData() {
        if (!marker) { showToast("GPS 연결 대기 중..."); return; }
        triggerVibration('success');
        const customAlarm = document.getElementById('alarm-time-picker').value;
        const now = Date.now();
        const newRecord = {
            id: now, timestamp: now,
            location: document.getElementById('loc-input').value || "미지정 구역",
            memo: document.getElementById('memo-input').value || "메모 없음",
            timeStr: new Date().toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            photo: currentImgBase64, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng,
            alarmTime: customAlarm ? new Date(customAlarm).getTime() : null,
            alarmDone: false
        };
        parkingHistory.unshift(newRecord);
        if (parkingHistory.length > 10) parkingHistory.pop();
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        updateMediaSession(newRecord);
        showToast("저장 완료");
        resetForm();
    }

    function resetForm() {
        document.getElementById('loc-input').value = "";
        document.getElementById('memo-input').value = "";
        document.getElementById('alarm-time-picker').value = "";
        document.getElementById('cam-btn').classList.remove('cam-done');
        document.getElementById('cam-text').textContent = "촬영하기";
        currentImgBase64 = "";
    }

    function calculateElapsed(ts) {
        const diff = Date.now() - ts;
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        return hours > 0 ? `${hours}시간 ${mins}분 경과` : `${mins}분 경과`;
    }

    function updateTimeAndAlarms() {
        if (parkingHistory.length > 0) {
            renderHistory();
            updateMediaSession(parkingHistory[0]);
        }
        const now = Date.now();
        parkingHistory.forEach(i => {
            if (i.alarmTime && !i.alarmDone && now > i.alarmTime) {
                triggerVibration('notify');
                alert(`🔔 출차 알람!\n[${i.location}] 시간입니다.`);
                i.alarmDone = true;
                localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
            }
        });
    }

    function renderHistory() {
        const latestDiv = document.getElementById('latest-record-area');
        const listDiv = document.getElementById('history-list');
        const prevDiv = document.getElementById('previous-history-area');
        latestDiv.innerHTML = ""; listDiv.innerHTML = ""; prevDiv.style.display = 'none';

        if (parkingHistory.length === 0) return;

        const latest = parkingHistory[0];
        const latestCard = document.createElement('div');
        latestCard.className = 'latest-card';
        latestCard.onclick = () => { map.setView([latest.lat, latest.lng], 18); window.scrollTo({top:0, behavior:'smooth'}); };
        
        let alarmBadge = (latest.alarmTime && !latest.alarmDone) ? `<div style="font-size:12px; color:var(--danger); font-weight:700; margin-bottom:8px;">🔔 알람: ${new Date(latest.alarmTime).getHours()}:${new Date(latest.alarmTime).getMinutes().toString().padStart(2, '0')}</div>` : "";

        latestCard.innerHTML = `
            <div class="elapsed-badge">⏱ ${calculateElapsed(latest.timestamp)}</div>
            ${alarmBadge}
            ${latest.photo ? `<img src="${latest.photo}" class="latest-img" onclick="openLightbox(event, '${latest.photo}')">` : ''}
            <div class="latest-title">${latest.location}</div>
            <div class="latest-memo">${latest.memo}</div>
        `;
        latestDiv.appendChild(latestCard);

        if (parkingHistory.length > 1) {
            prevDiv.style.display = 'block';
            for (let i = 1; i < parkingHistory.length; i++) {
                const item = parkingHistory[i];
                const cont = document.createElement('div'); cont.className = 'history-item-container';
                const card = document.createElement('div'); card.className = 'history-card';
                card.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
                card.addEventListener('touchmove', (e) => { currentX = e.touches[0].clientX; let diff = currentX - startX; if (diff < 0) card.style.transform = `translateX(${diff}px)`; });
                card.addEventListener('touchend', () => { if (currentX - startX < -50) card.style.transform = 'translateX(-85px)'; else card.style.transform = 'translateX(0px)'; });
                card.innerHTML = `<img src="${item.photo || ''}" class="h-img" onclick="openLightbox(event, '${item.photo}')"><div class="h-content"><div class="h-meta">${item.timeStr}</div><div class="h-loc">${item.location}</div></div>`;
                const delBtn = document.createElement('button'); delBtn.className = 'swipe-delete-btn'; delBtn.textContent = "삭제";
                delBtn.onclick = () => { triggerVibration('delete'); deleteRecord(item.id); };
                cont.appendChild(card); cont.appendChild(delBtn); listDiv.appendChild(cont);
            }
        }
    }

    function deleteRecord(id) {
        parkingHistory = parkingHistory.filter(i => i.id !== id);
        localStorage.setItem('parkNoteHistory', JSON.stringify(parkingHistory));
        renderHistory();
        showToast("삭제 완료");
    }

    function openLightbox(e, img) { e.stopPropagation(); document.getElementById('lightbox-img').src = img; document.getElementById('lightbox').style.display = 'flex'; }
    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
    function loadHistory() { const saved = localStorage.getItem('parkNoteHistory'); if (saved) { parkingHistory = JSON.parse(saved); renderHistory(); } }
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
</script>
</body>
</html>
