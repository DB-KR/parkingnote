<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkNote Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&family=Space+Grotesk:wght@600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #4f8ef7; --bg: #f8f9fd; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --radius: 20px; --danger: #ff4d4d; --accent: #eef4ff; }
        @media (prefers-color-scheme: dark) { :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #2d3a4f; } }
        body { background: var(--bg); font-family: 'Pretendard', sans-serif; color: var(--text); overflow-x: hidden; user-select: none; }
        .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 50px; }
        .header { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 24px; color: var(--primary); }
        .gps-badge { font-size: 11px; padding: 4px 10px; background: var(--card); border-radius: 20px; color: var(--muted); border: 1px solid var(--border); }
        .gps-badge.ready { color: #fff; background: #22c55e; border-color: #22c55e; }
        #map { height: 240px; border-radius: var(--radius); margin: 0 15px 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 1; }
        .input-section { padding: 0 15px; }
        .main-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .fields-column { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .input-field { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 13px 15px; font-size: 15px; color: var(--text); outline: none; }
        .cam-btn-side { width: 95px; background: var(--accent); color: var(--primary); border: 2px solid var(--primary); border-radius: 15px; font-weight: 800; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
        .cam-btn-side.cam-done { background: var(--primary); color: white; }
        .save-btn { background: var(--primary); color: white; border: none; border-radius: 18px; padding: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px rgba(79, 142, 247, 0.2); }
        .latest-record { padding: 25px 15px; }
        .elapsed-badge { background: var(--primary); color: white; padding: 6px 12px; border-radius: 12px; font-size: 15px; font-weight: 800; display: inline-block; margin-bottom: 12px; }
        .latest-card { background: var(--card); border-radius: var(--radius); padding: 22px; border: 2px solid var(--primary); }
        .latest-img { width: 100%; height: 180px; border-radius: 12px; object-fit: cover; margin-bottom: 15px; }
        .latest-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .latest-memo { font-size: 14px; color: var(--primary); font-weight: 600; background: var(--accent); padding: 12px; border-radius: 12px; }
        .history-card { background: var(--card); border-radius: 18px; padding: 12px; display: flex; gap: 15px; align-items: center; border: 1px solid var(--border); margin: 0 15px 10px; }
        .h-img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #1e293b; color: #fff; padding: 12px 25px; border-radius: 30px; transition: 0.3s; z-index: 9999; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header">
        <h1>ParkNote<span>Pro</span></h1>
        <div class="gps-badge" id="gps-status">GPS 대기...</div>
    </header>

    <div id="map"></div>

    <section class="input-section">
        <div class="main-input-row">
            <div class="fields-column">
                <input class="input-field" id="loc-input" placeholder="주차 구역 (예: 지하 1층)">
                <input class="input-field" id="memo-input" placeholder="메모 (예: 기둥 뒤)">
            </div>
            <button class="cam-btn-side" id="cam-btn" onclick="document.getElementById('camera-input').click()">
                <span style="font-size:24px;">📷</span><span id="cam-text">촬영</span>
            </button>
        </div>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
        <button class="save-btn" onclick="saveData()">📍 주차 정보 저장</button>
    </section>

    <div id="latest-record-area" style="padding: 20px 15px;"></div>
    <div id="history-list"></div>
</div>

<div id="battery-modal" class="modal">
    <div class="modal-content">
        <h2>🔋 알림 유지 설정</h2>
        <p style="margin: 15px 0; font-size: 14px; color: var(--muted);">잠금화면에서 정보를 계속 보려면<br>[앱 정보 > 배터리 > 제한 없음] 설정을 권장합니다.</p>
        <button class="save-btn" onclick="closeBatteryModal()">확인했습니다</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, marker, currentImgBase64 = "";
    let parkingHistory = [];

    // 서비스 워커 등록
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    window.onload = function() {
        initMap();
        loadHistory();
        checkNotificationPermission();
        setInterval(updateUI, 60000);
    };

    async function checkNotificationPermission() {
        if ("Notification" in window && Notification.permission !== "granted") {
            await Notification.requestPermission();
        }
        if (window.matchMedia('(display-mode: standalone)').matches && !localStorage.getItem('b_guide')) {
            document.getElementById('battery-modal').style.display = 'flex';
        }
    }

    function closeBatteryModal() {
        localStorage.setItem('b_guide', 'true');
        document.getElementById('battery-modal').style.display = 'none';
    }

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.5665, 126.9780], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude, lng = pos.coords.longitude;
                if (!marker) { marker = L.marker([lat, lng]).addTo(map); map.setView([lat, lng], 17); }
                else { marker.setLatLng([lat, lng]); }
                document.getElementById('gps-status').textContent = "연결됨";
                document.getElementById('gps-status').classList.add('ready');
            }, null, { enableHighAccuracy: true });
        }
    }

    document.getElementById('camera-input').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX = 600;
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImgBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('cam-btn').classList.add('cam-done');
                };
            };
            reader.readAsDataURL(file);
        }
    };

    function saveData() {
        if (!marker) return showToast("GPS 수신 중...");
        const now = Date.now();
        const record = {
            id: now, timestamp: now,
            location: document.getElementById('loc-input').value || "미지정 구역",
            memo: document.getElementById('memo-input').value || "메모 없음",
            photo: currentImgBase64, lat: marker.getLatLng().lat, lng: marker.getLatLng().lng
        };
        parkingHistory.unshift(record);
        if (parkingHistory.length > 5) parkingHistory.pop();
        localStorage.setItem('parkHistory', JSON.stringify(parkingHistory));
        render();
        showNotification(record);
        showToast("주차 정보 고정 완료!");
        currentImgBase64 = ""; document.getElementById('cam-btn').classList.remove('cam-done');
        document.getElementById('loc-input').value = ""; document.getElementById('memo-input').value = "";
    }

    function showNotification(record) {
        if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(`🅿️ 주차: ${record.location}`, {
                    body: `${calculateElapsed(record.timestamp)} 경과\n${record.memo}`,
                    image: record.photo,
                    icon: 'https://cdn-icons-png.flaticon.com/512/2991/2991231.png',
                    tag: 'parking-info',
                    requireInteraction: true,
                    vibrate: [100]
                });
            });
        }
    }

    function calculateElapsed(ts) {
        const mins = Math.floor((Date.now() - ts) / 60000);
        return mins >= 60 ? `${Math.floor(mins/60)}시간 ${mins%60}분` : `${mins}분`;
    }

    function updateUI() {
        if (parkingHistory.length > 0) {
            render();
            showNotification(parkingHistory[0]);
        }
    }

    function render() {
        const area = document.getElementById('latest-record-area');
        const list = document.getElementById('history-list');
        area.innerHTML = ""; list.innerHTML = "";
        if (parkingHistory.length === 0) return;

        const latest = parkingHistory[0];
        area.innerHTML = `
            <div class="elapsed-badge">⏱ ${calculateElapsed(latest.timestamp)} 경과</div>
            <div class="latest-card">
                ${latest.photo ? `<img src="${latest.photo}" class="latest-img">` : ''}
                <div class="latest-title">${latest.location}</div>
                <div class="latest-memo">${latest.memo}</div>
            </div>
        `;
    }

    function loadHistory() {
        const saved = localStorage.getItem('parkHistory');
        if (saved) { parkingHistory = JSON.parse(saved); render(); }
    }

    function showToast(m) {
        const t = document.getElementById('toast'); t.textContent = m;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
